<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>By DANILEVSKIJ - Chess Pro AI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        :root {
            --bg-grad-1: #0f2027;
            --bg-grad-2: #203a43;
            --bg-grad-3: #2c5364;
            --glass-bg: rgba(22, 33, 62, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-color: #4ecca3;
            --accent-hover: #45b791;
            --text-color: #eeeeee;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2), var(--bg-grad-3));
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        h2 { 
            margin-top: 10px; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(78, 204, 163, 0.5);
            font-weight: 600;
        }

        /* Glassmorphism для панелей */
        .panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
        }

        #setup {
            padding: 30px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            margin-top: 20px;
        }

        .input-group { 
            margin-bottom: 20px; 
            text-align: left; 
        }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 0.9em; 
            color: #a0aec0; 
            font-weight: 600;
        }

        select {
            width: 100%;
            padding: 12px;
            background: rgba(15, 52, 96, 0.8);
            border: 1px solid rgba(78, 204, 163, 0.4);
            color: white;
            border-radius: 10px;
            outline: none;
            font-family: 'Poppins', sans-serif;
            font-size: 1em;
            transition: border 0.3s;
            cursor: pointer;
        }

        select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(78, 204, 163, 0.3);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--accent-color), #2ab7ca);
            border: none;
            border-radius: 10px;
            color: #1a1a2e;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(78, 204, 163, 0.4);
        }

        #gameContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        #board {
            width: 100%;
            max-width: 600px;
            margin: 20px auto;
            border: 8px solid rgba(15, 52, 96, 0.9);
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 20px rgba(78, 204, 163, 0.2);
        }

        #status {
            font-size: 1.2em;
            font-weight: 600;
            margin: 10px 0;
            padding: 12px 30px;
            text-align: center;
            color: var(--accent-color);
            min-height: 1.5em;
        }

        .btn-danger {
            background: linear-gradient(45deg, #e94560, #d63447);
            color: white;
            width: auto;
            padding: 12px 40px;
        }

        .btn-danger:hover {
            box-shadow: 0 10px 20px rgba(233, 69, 96, 0.4);
        }

        .hidden { display: none !important; }
        
        /* Загрузочный спиннер (когда ИИ думает) */
        #thinking {
            display: none;
            color: #f6c90e;
            font-size: 0.9em;
            margin-top: 5px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <h2 id="ui-title">Chess Pro AI</h2>

    <div id="setup" class="panel">
        <div class="input-group">
            <label id="ui-lang-label">Язык / Мова / Jazyk</label>
            <select id="langSelect" onchange="changeLang()">
                <option value="ru">Русский</option>
                <option value="uk">Українська</option>
                <option value="cs">Čeština</option>
            </select>
        </div>

        <div class="input-group">
            <label id="ui-side-label">Выберите сторону</label>
            <select id="userColor">
                <option value="w" id="ui-white">Белые</option>
                <option value="b" id="ui-black">Черные</option>
            </select>
        </div>

        <div class="input-group">
            <label id="ui-diff-label">Уровень сложности</label>
            <select id="skillLevel">
                <option value="0" id="ui-diff-0">Новичок (Случайные ходы)</option>
                <option value="1" id="ui-diff-1">Любитель (Захват фигур)</option>
                <option value="2" id="ui-diff-2">Опытный (Быстрый анализ)</option>
                <option value="3" id="ui-diff-3">Профи (Анализ 2 хода)</option>
                <option value="4" id="ui-diff-4">Мастер (Глубокий анализ)</option>
            </select>
        </div>

        <button onclick="startGame()" id="ui-play-btn">ИГРАТЬ</button>
    </div>

    <div id="gameContainer" class="hidden">
        <div id="status" class="panel">Ожидание хода...</div>
        <div id="thinking">ИИ думает...</div>
        <div id="board"></div>
        <div>
            <button class="btn-danger" onclick="location.reload()" id="ui-reset-btn">Сдаться / Заново</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>

        var game = new Chess();
        var userColor = 'w';
        var currentLang = 'ru';

        // Локализация
        const i18n = {
            ru: {
                title: "Chess Pro AI", side: "Выберите сторону", white: "Белые (первый ход)", black: "Черные",
                diff: "Уровень сложности", play: "ИГРАТЬ", reset: "Сдаться / Заново", turnW: "Ваш ход (Белые)", 
                turnB: "Ваш ход (Черные)", check: "ШАХ", mate: "МАТ! Победили ", draw: "НИЧЬЯ", thinking: "ИИ думает...",
                diffs: ["Новичок", "Любитель", "Опытный", "Профи", "Мастер"], winners: { w: "Белые", b: "Черные" }
            },
            uk: {
                title: "Шахи Pro AI", side: "Оберіть сторону", white: "Білі (перший хід)", black: "Чорні",
                diff: "Рівень складності", play: "ГРАТИ", reset: "Здатися / Спочатку", turnW: "Ваш хід (Білі)", 
                turnB: "Ваш хід (Чорні)", check: "ШАХ", mate: "МАТ! Перемогли ", draw: "НІЧИЯ", thinking: "ШІ думає...",
                diffs: ["Новачок", "Любитель", "Досвідчений", "Профі", "Майстер"], winners: { w: "Білі", b: "Чорні" }
            },
            cs: {
                title: "Šachy Pro AI", side: "Vyberte stranu", white: "Bílí (začínají)", black: "Černí",
                diff: "Úroveň obtížnosti", play: "HRÁT", reset: "Vzdát se / Znovu", turnW: "Tvůj tah (Bílí)", 
                turnB: "Tvůj tah (Černí)", check: "ŠACH", mate: "ŠACHMAT! Vyhráli ", draw: "REMÍZA", thinking: "AI přemýšlí...",
                diffs: ["Začátečník", "Amatér", "Zkušený", "Profi", "Mistr"], winners: { w: "Bílí", b: "Černí" }
            }
        };

        function changeLang() {
            currentLang = $('#langSelect').val();
            const t = i18n[currentLang];
            $('#ui-title').text(t.title);
            $('#ui-side-label').text(t.side);
            $('#ui-white').text(t.white);
            $('#ui-black').text(t.black);
            $('#ui-diff-label').text(t.diff);
            $('#ui-play-btn').text(t.play);
            $('#ui-reset-btn').text(t.reset);
            $('#thinking').text(t.thinking);
            for(let i=0; i<5; i++) $(`#ui-diff-${i}`).text(t.diffs[i]);
            updateStatus();
        }

        // Логика ИИ
        const weights = { p: 10, n: 30, b: 30, r: 50, q: 90, k: 900 };
        function evaluateBoard(game) {
            let total = 0;
            game.board().forEach(row => {
                row.forEach(p => {
                    if (p) {
                        let val = weights[p.type];
                        total += (p.color === 'w' ? val : -val);
                    }
                });
            });
            return total;
        }

        function minimax(game, depth, alpha, beta, isMax) {
            if (depth === 0 || game.game_over()) return evaluateBoard(game);
            let moves = game.moves();
            
            if (isMax) {
                let best = -9999;
                for (let m of moves) {
                    game.move(m);
                    best = Math.max(best, minimax(game, depth - 1, alpha, beta, false));
                    game.undo();
                    alpha = Math.max(alpha, best);
                    if (beta <= alpha) break;
                }
                return best;
            } else {
                let best = 9999;
                for (let m of moves) {
                    game.move(m);
                    best = Math.min(best, minimax(game, depth - 1, alpha, beta, true));
                    game.undo();
                    beta = Math.min(beta, best);
                    if (beta <= alpha) break;
                }
                return best;
            }
        }

        function getBestMove(depth) {
            let moves = game.moves();
            let bestMove = null;
            let isMax = game.turn() === 'w'; // Если ИИ играет за белых, он максимизирует
            let bestVal = isMax ? -9999 : 9999;
            
            moves.sort(() => Math.random() - 0.5); // Рандомизируем равные ходы
            
            for (let m of moves) {
                game.move(m);
                let v = minimax(game, depth - 1, -10000, 10000, !isMax);
                game.undo();
                
                if (isMax) {
                    if (v > bestVal) { bestVal = v; bestMove = m; }
                } else {
                    if (v < bestVal) { bestVal = v; bestMove = m; }
                }
            }
            return bestMove;
        }
